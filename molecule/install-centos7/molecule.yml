---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: centos7
    image_name: CentOS 7 64-bit
    groups: ['ssh']
provisioner:
  name: ansible
  playbooks:
    create: ../default/create-os.yml
    destroy: ../default/destroy-os.yml
    converge: ../default-install/converge.yml
    verify: ../default-install/verify.yml
verifier:
  name: ansible
