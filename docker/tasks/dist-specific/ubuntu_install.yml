---
- name: Install supportive packages via apt (version != 18)
  when: ansible_facts["distribution_major_version"] != "18"
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - gnupg
      - python3-pip
    update_cache: yes
  register: apt_result
  retries: 20
  delay: 10
  until: apt_result.rc is not defined
  become: yes

- name: Install supportive packages via apt (version == 18)
  when: ansible_facts["distribution_major_version"] == "18"
  ansible.builtin.shell: apt-get update && apt-get install -y ca-certificates gnupg
  register: apt_result

- name: Add Docker’s official GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  register: apt_key_result
  until: not apt_key_result.failed
  retries: 20

- name: Set up the stable repository (version != 18)
  when: ansible_facts["distribution_major_version"] != "18"
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present

- name: Set up the stable repository (version == 18)
  when: ansible_facts["distribution_major_version"] == "18"
  ansible.builtin.shell: |
    add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"

- name: Install docker engine (version != 18)
  when: ansible_facts["distribution_major_version"] != "18"
  ansible.builtin.apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    update_cache: yes
  register: apt_result
  until: apt_result.rc is not defined
  retries: 20
  delay: 10

- name: Install docker engine (version == 18)
  when: ansible_facts["distribution_major_version"] == "18"
  ansible.builtin.shell: apt-get update && apt-get install -y docker-ce docker-ce-cli containerd.io

- name: Install pip packages (greater/equal Ubuntu 24)
  when: (ansible_facts["distribution_major_version"] | int >= 24)
  ansible.builtin.apt:
    pkg:
      - python3-docker
  register: apt_pip_result
  until: not apt_pip_result.failed
  retries: 20

- name: Install pip packages (Ubuntu 20, 22)
  when: (ansible_facts["distribution_major_version"] | int > 18) and (ansible_facts["distribution_major_version"] | int < 24)
  ansible.builtin.pip:
    name:
      - docker==6.1.3
      - docker-compose==1.29.2
  register: pip_result
  until: not pip_result.failed
  retries: 20

- name: Install pip packages (Ubuntu 18)
  when: ansible_facts["distribution_major_version"] == "18"
  ansible.builtin.command: /usr/local/bin/pip3.12 install PyYAML==6.0.3
