---
- name: Converge - Uninstall (ssh)
  hosts: ssh
  gather_facts: true
  become: true
  vars:
    state: absent
  roles:
    - "../../.."

- name: Converge - Uninstall (winrm/win-ssh)
  hosts: winrm:win-ssh
  gather_facts: false
  become: true
  vars:
    state: absent
  tasks:
    - name: Gathering Facts
      ansible.windows.setup:
        gather_subset:
          - "!all"
      async: 30
      poll: 5
      retries: 3

    - name: "Include docker - state = present"
      ansible.builtin.include_role:
        name: "../../.."
