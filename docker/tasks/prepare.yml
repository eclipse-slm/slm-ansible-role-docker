---
- name: Get Python version
  ansible.builtin.raw: python3 --version
  register: python_version_raw
  failed_when: false
  changed_when: false

- name: Store detected Python version text
  ansible.builtin.set_fact:
    python_version_text: "{{ (python_version_raw.stdout | default('') | trim) or (python_version_raw.stderr | default('') | trim) }}"

- name: Store detected Python version
  ansible.builtin.set_fact:
    python_version: "{{ (python_version_text | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+)', '\\1')) | default('unknown') }}"

- debug:
    msg: "Detected Python version: {{ python_version }}"

- name: Detect distribution id
  ansible.builtin.raw: . /etc/os-release && echo ${ID:-unknown}
  register: distro_id
  failed_when: false
  changed_when: false
    
- name: Update Python (Ubuntu)
  when: distro_id.stdout | default('') | trim == 'ubuntu'
  block:
    - name: Get Ubuntu version id
      ansible.builtin.raw: . /etc/os-release && echo ${VERSION_ID:-unknown}
      register: ubuntu_version_id_raw
      failed_when: false
      changed_when: false

    - name: Store Ubuntu major version
      ansible.builtin.set_fact:
        ubuntu_major_version: "{{ (ubuntu_version_id_raw.stdout | default('') | trim | regex_search('^([0-9]+)', '\\1'))[0] | default('unknown') }}"

    - debug:
        msg: "Detected Ubuntu major version: {{ ubuntu_major_version }}"

    - name: Update Python (Ubuntu 18)
      when: ubuntu_major_version == '18'
      block:
        - name: Set facts
          ansible.builtin.set_fact:
              python_source: "https://www.python.org/ftp/python/3.12.13/Python-3.12.13.tgz"
              python_download_dst: "/tmp/Python-3.12.13.tgz"
              python_extracted_dir: "/tmp/Python-3.12.13"

        - name: Download Python source
          ansible.builtin.raw: |
            wget -q {{ python_source }} -O {{ python_download_dst }}
          register: download_python
          changed_when: false

        - name: Extract Python source
          ansible.builtin.raw: |
            tar -xf {{ python_download_dst }} -C /tmp
          register: extract_python
          changed_when: false

        - name: Install build dependencies
          ansible.builtin.raw: |
            apt update && apt install -y build-essential zlib1g-dev libncurses5-dev \
              libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev wget libbz2-dev
          register: install_build_deps
          changed_when: false

        - name: Check if Python 3.12 is already installed
          ansible.builtin.raw: test -e /usr/local/bin/python3.12 && echo '1' || echo '0'
          register: check_python_312
          failed_when: false
          changed_when: false

        - name: Build and install Python
          when: (check_python_312.stdout | replace('\r', '') | replace('\n', '') | trim) == '0'
          ansible.builtin.raw: |
            cd {{ python_extracted_dir }} && \
            ./configure --enable-optimizations && \
            make -j $(nproc) && \
            make altinstall
          register: build_install_python
          changed_when: false

        - name: Set Interpreter
          ansible.builtin.set_fact:
            ansible_python_interpreter: "/usr/local/bin/python3.12"
