name: Mirror hello-world to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror-image:
    runs-on: ubuntu-latest

    steps:
      - name: Compute image names
        id: vars
        shell: bash
        run: |
          echo "source_image=docker.io/library/hello-world:latest" >> "$GITHUB_OUTPUT"
          echo "target_image=ghcr.io/${GITHUB_REPOSITORY,,}/hello-world:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from Docker Hub
        run: docker pull "${{ steps.vars.outputs.source_image }}"

      - name: Tag image for GHCR
        run: docker tag "${{ steps.vars.outputs.source_image }}" "${{ steps.vars.outputs.target_image }}"

      - name: Push image to GHCR
        run: docker push "${{ steps.vars.outputs.target_image }}"
