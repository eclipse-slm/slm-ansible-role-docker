---
- name: Converge - Install (ssh)
  hosts: all
  gather_facts: true
  become: true
  vars:
    state: present
  roles:
    - "../../.."

- name: Converge - Install (winrm/win-ssh)
  hosts: winrm:win-ssh
  gather_facts: false
  become: true
  tasks:
    - name: Gathering Facts
      ansible.windows.setup:
        gather_subset:
          - "!all"
      async: 30
      poll: 5
      retries: 3

    - name: "Include docker - state = present"
      ansible.builtin.include_role:
        name: "docker"
